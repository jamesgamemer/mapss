<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>7DS Origin - Interactive Map</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/navbar-auth.css?v=20260308">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Leaflet MarkerCluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
  <style>
    :root {
      --bg-color: #080d17;
      --panel-bg: rgba(8, 13, 23, 0.96);
      --panel-border: rgba(121, 145, 184, 0.26);
      --gold: #f0c040;
      --text-muted: #7991b8;
      --shadow: rgba(0, 0, 0, 0.42) 0px 22px 46px 0px;
    }

    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: var(--bg-color);
      font-family: 'Sora', sans-serif;
    }

    #map-container {
      position: absolute;
      top: 70px;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1;
    }

    #map {
      width: 100%;
      height: 100%;
      background: var(--bg-color);
    }

    /* ── SEVENMAP STYLE OVERLAYS ── */
    .toolbar {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1000;
      display: flex;
      gap: 10px;
    }

    .toolbar-btn {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      color: white;
      padding: 10px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .toolbar-btn:hover {
      border-color: var(--gold);
      background: rgba(240, 192, 64, 0.1);
    }

    /* ── FILTERS PANEL ── */
    #filters-panel {
      position: absolute;
      top: 80px;
      left: 20px;
      width: 320px;
      max-height: calc(100vh - 120px);
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      color: white;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.3s ease, opacity 0.3s ease;
      backdrop-filter: blur(15px);
    }

    #filters-panel.hidden {
      transform: translateX(-20px);
      opacity: 0;
      pointer-events: none;
    }

    .panel-header {
      padding: 20px;
      border-bottom: 1px solid var(--panel-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-header h3 {
      margin: 0;
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 18px;
      letter-spacing: 1px;
    }

    .close-btn {
      cursor: pointer;
      color: var(--text-muted);
      font-size: 24px;
      line-height: 1;
    }

    .panel-content {
      padding: 10px 20px 20px;
      overflow-y: auto;
      flex: 1;
    }

    .search-box {
      margin-bottom: 20px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      padding: 12px 15px;
      color: white;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
    }

    .search-box input:focus {
      border-color: var(--gold);
    }

    .filter-group {
      margin-bottom: 25px;
    }

    .filter-group-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 5px;
    }

    .filter-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      cursor: pointer;
      border-radius: 10px;
      transition: background 0.2s;
      margin-bottom: 4px;
      user-select: none;
    }

    .filter-item:hover {
      background: rgba(255,255,255,0.05);
    }

    .filter-item.active {
      background: rgba(240, 192, 64, 0.15);
      border: 1px solid rgba(240, 192, 64, 0.2);
    }

    .filter-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .filter-icon img {
      max-width: 100%;
      max-height: 100%;
    }

    .filter-label {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
    }

    .filter-count {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── CUSTOM MARKER ── */
    .custom-marker {
      background: none;
      border: none;
    }

    .marker-wrapper {
      width: 36px;
      height: 36px;
      background: rgba(8, 13, 23, 0.85);
      border: 1.5px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px rgba(240, 192, 64, 0.4);
      transition: transform 0.2s;
    }

    .marker-wrapper:hover {
      transform: scale(1.2);
      z-index: 1000;
    }

    .marker-wrapper img {
      width: 22px;
      height: 22px;
    }

    /* ── POPUP STYLE ── */
    .leaflet-popup-content-wrapper {
      background: var(--panel-bg);
      color: white;
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 5px;
      backdrop-filter: blur(10px);
    }

    .leaflet-popup-tip {
      background: var(--panel-bg);
    }

    .popup-content {
      padding: 10px;
    }

    .popup-title {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .popup-info {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .popup-info b {
      color: white;
    }

    /* Navbar adjustment */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 2000;
      background: rgba(2, 6, 23, 0.98);
      border-bottom: 1px solid var(--panel-border);
    }

    /* Marker Cluster Custom Style */
    .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
      background-color: rgba(240, 192, 64, 0.2);
    }
    .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
      background-color: rgba(240, 192, 64, 0.8);
      color: #000;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-logo">7DS<span>Origin</span></a>
    <div class="navbar-hamburger" id="navHam">
      <span></span><span></span><span></span>
    </div>
    <ul class="navbar-links" id="navLinks">
      <li><a href="index.html">&#127968; Home</a></li>
      <li><a href="characters.html">&#9876; Characters</a></li>
      <li><a href="weapons.html">&#128481; Weapons</a></li>
      <li><a href="tierlist.html">&#127942; Tier List</a></li>
      <li><a href="events.html">&#127881; Events</a></li>
      <li><a href="guides.html">&#128218; Guides</a></li>
      <li><a href="team-builder.html">&#9881; Team Builder</a></li>
      <li><a href="map.html" class="active">🗺️ Map</a></li>
    </ul>
  </nav>

  <div id="map-container">
    <div id="map"></div>
    
    <div class="toolbar">
      <button class="toolbar-btn" onclick="toggleFilters()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
        Filters
      </button>
    </div>

    <div id="filters-panel">
      <div class="panel-header">
        <h3>SEVENMAP Filters</h3>
        <span class="close-btn" onclick="toggleFilters()">×</span>
      </div>
      <div class="panel-content">
        <div class="search-box">
          <input type="text" id="mapSearch" placeholder="Search markers..." oninput="filterMarkersList()">
        </div>
        <div id="filter-groups-container">
          <!-- Groups will be injected here -->
        </div>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Leaflet MarkerCluster JS -->
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
  <script>
    let map;
    let markerClusterGroup;
    let allPoints = [];
    let activeFilters = new Set();
    let subcatIcons = {};

    async function init() {
      // Initialize Map
      map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -5,
        maxZoom: 2,
        zoomControl: false,
        attributionControl: false
      });

      L.control.zoom({ position: 'bottomright' }).addTo(map);
      
      // Initialize Marker Cluster Group
      markerClusterGroup = L.markerClusterGroup({
        showCoverageOnHover: false,
        maxClusterRadius: 50
      });
      map.addLayer(markerClusterGroup);

      // Load Data
      try {
        const [pointsRes, iconsRes] = await Promise.all([
          fetch('data/map/map_data.json'),
          fetch('data/map/subcategory_icons.json')
        ]);
        
        allPoints = await pointsRes.json();
        const iconData = await iconsRes.json();
        
        // Flatten icons for easy access
        for (const cat in iconData.categories) {
          for (const sub in iconData.categories[cat]) {
            const iconPath = iconData.categories[cat][sub].icon;
            subcatIcons[sub] = iconPath.split('/').pop();
          }
        }

        setupFilters();
        renderMarkers();
        
        // Center map on a reasonable area
        if (allPoints.length > 0) {
          map.setView([allPoints[0].y / 100, allPoints[0].x / 100], -3);
        }
      } catch (e) {
        console.error("Error loading map data:", e);
      }
    }

    function setupFilters() {
      const container = document.getElementById('filter-groups-container');
      const groups = {};

      allPoints.forEach(p => {
        const cat = p.category_label || 'Other';
        if (!groups[cat]) groups[cat] = {};
        if (!groups[cat][p.type]) groups[cat][p.type] = 0;
        groups[cat][p.type]++;
        activeFilters.add(p.type);
      });

      let html = '';
      // Sort categories to match sevenmap.com better
      const sortedCats = Object.keys(groups).sort();
      
      sortedCats.forEach(cat => {
        html += `<div class="filter-group">
          <div class="filter-group-title"><span>${cat}</span></div>`;
        for (const type in groups[cat]) {
          const iconFile = subcatIcons[type] || `${type}.png`;
          html += `
            <div class="filter-item active" id="filter-${type}" onclick="toggleFilter('${type}')">
              <div class="filter-icon">
                <img src="images/map_icons/${iconFile}" onerror="this.src='images/map_icons/chest.png'">
              </div>
              <div class="filter-label">${type.charAt(0).toUpperCase() + type.slice(1)}</div>
              <div class="filter-count">${groups[cat][type]}</div>
            </div>`;
        }
        html += `</div>`;
      });
      container.innerHTML = html;
    }

    function toggleFilter(type) {
      const el = document.getElementById(`filter-${type}`);
      if (activeFilters.has(type)) {
        activeFilters.delete(type);
        el.classList.remove('active');
      } else {
        activeFilters.add(type);
        el.classList.add('active');
      }
      renderMarkers();
    }

    function renderMarkers() {
      markerClusterGroup.clearLayers();
      const markers = [];
      
      allPoints.forEach(p => {
        if (activeFilters.has(p.type)) {
          const iconFile = subcatIcons[p.type] || `${p.type}.png`;
          const marker = L.marker([p.y / 100, p.x / 100], {
            icon: L.divIcon({
              className: 'custom-marker',
              html: `<div class="marker-wrapper">
                <img src="images/map_icons/${iconFile}" onerror="this.src='images/map_icons/chest.png'">
              </div>`,
              iconSize: [36, 36],
              iconAnchor: [18, 18]
            })
          });

          marker.bindPopup(`
            <div class="popup-content">
              <div class="popup-title">${p.label || p.name}</div>
              <div class="popup-info">
                <b>Region:</b> ${p.region}<br>
                <b>Type:</b> ${p.type}
              </div>
            </div>
          `);
          markers.push(marker);
        }
      });
      
      markerClusterGroup.addLayers(markers);
    }

    function toggleFilters() {
      document.getElementById('filters-panel').classList.toggle('hidden');
    }

    function filterMarkersList() {
      const query = document.getElementById('mapSearch').value.toLowerCase();
      document.querySelectorAll('.filter-item').forEach(item => {
        const label = item.querySelector('.filter-label').innerText.toLowerCase();
        item.style.display = label.includes(query) ? 'flex' : 'none';
      });
    }

    window.onload = init;
  </script>
  <script src="js/navbar.js"></script>
</body>
</html>
